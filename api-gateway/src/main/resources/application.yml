server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: project-service
          uri: http://project-service:8081
          predicates:
            - Path=/proyectos/**, /tareas/**

        - id: resource-service
          uri: http://resource-service:8082
          predicates:
            - Path=/recursos/**, /usuarios/**

        - id: analytics-service
          uri: http://analytics-service:8083
          predicates:
            - Path=/api/analytics/**