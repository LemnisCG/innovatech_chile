server:
  port: 9000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: project-service
          uri: http://project-service:8081
          predicates:
            - Path=/proyectos/**, /tareas/**
          filters:
            - AuthenticationFilter

        - id: resource-service
          uri: http://resource-service:8082
          predicates:
            - Path=/recursos/**, /usuarios/**, /api/auth/**
          filters:
            - AuthenticationFilter

        - id: analytics-service
          uri: http://analytics-service:8083
          predicates:
            - Path=/api/analytics/**
          filters:
            - AuthenticationFilter