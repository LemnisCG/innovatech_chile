spring.application.name=analytics-service
server.port=8083

# Usaremos la misma base de datos de project-service para alojar el esquema ROLAP por simplicidad
# En un ambiente real, esto podría ser un Data Warehouse separado al cual ambos tienen acceso.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/innovatech_projects
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Inicialización de la base de datos (crear esquema ROLAP si no existe)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/init-analytics-db.sql

# Logging
logging.level.cl.innovatech.analytics=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG
