version: '3.8'

services:
  # --- MICROSERVICIOS ---
  project-service:
    build:
      context: .
      dockerfile: project-service/Dockerfile
    container_name: innovatech_project_service
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      DB_HOST: project-db
      DB_PORT: 5432
    depends_on:
      - project-db
    networks:
      - innovatech-network

  resource-service:
    build:
      context: .
      dockerfile: resource-service/Dockerfile
    container_name: innovatech_resource_service
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      DB_HOST: resource-db
      DB_PORT: 5432
    depends_on:
      - resource-db
    networks:
      - innovatech-network

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
    container_name: innovatech_analytics_service
    restart: on-failure
    ports:
      - "8083:8083"
    environment:
      DB_HOST: project-db
      DB_PORT: 5432
    depends_on:
      - project-db
      - project-service
    networks:
      - innovatech-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: innovatech_api_gateway
    restart: on-failure
    ports:
      - "9000:9000"
    depends_on:
      - project-service
      - resource-service
      - analytics-service
    networks:
      - innovatech-network

  frontend:
    build:
      context: ./frontend-dashboard
      dockerfile: Dockerfile
    container_name: innovatech_frontend
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api-gateway:9000
    depends_on:
      - api-gateway
    networks:
      - innovatech-network

  # --- BASES DE DATOS ---
  # Base de datos exclusiva para el microservicio de Proyectos
  project-db:
    image: postgres:15-alpine
    container_name: innovatech_project_db
    restart: always
    environment:
      POSTGRES_DB: innovatech_projects
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432" # Mapeamos al 5435 para evitar conflictos adicionales
    volumes:
      - project_db_data:/var/lib/postgresql/data
    networks:
      - innovatech-network

  # Base de datos exclusiva para el microservicio de Recursos
  resource-db:
    image: postgres:15-alpine
    container_name: innovatech_resource_db
    restart: always
    environment:
      POSTGRES_DB: innovatech_resources
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432" # Mapeamos al 5434 para independizarlo completamente
    volumes:
      - resource_db_data:/var/lib/postgresql/data
    networks:
      - innovatech-network

  # Interfaz gráfica para administrar las bases de datos
  pgadmin:
    image: dpage/pgadmin4
    container_name: innovatech_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@innovatech.cl
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5052:80"
    depends_on:
      - project-db
      - resource-db
    networks:
      - innovatech-network

volumes:
  project_db_data:
  resource_db_data:

networks:
  innovatech-network:
    driver: bridge
