spring.application.name=analytics-service
server.port=8083

# La base de datos analítica dedicada (innovatech_analytics)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5436}/innovatech_analytics
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Inicialización de la base de datos (crear esquema ROLAP si no existe)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/init-analytics-db.sql

# Logging
logging.level.cl.innovatech.analytics=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG
